version: '3.11'

services:
  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}  # значение по умолчанию 'postgres'
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # обязательное поле
      POSTGRES_DB: ${POSTGRES_DB}    # значение по умолчанию
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-md5}  # безопасный метод

    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: dchmilenko/my-project:backend-school
    container_name: django-app
    env_file:
      - prod.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DJANGO_SETTINGS_MODULE=myproject.settings
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=admin123
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      # - media_volume:/app/media
    command: >
      sh -c "python manage.py migrate &&
             (python manage.py createsuperuser --noinput || true) &&
              python manage.py collectstatic --noinput &&
             gunicorn myproject.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  # media_volume: